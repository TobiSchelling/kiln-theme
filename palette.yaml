# ANSI 16-color mapping (for terminals)
ansi_mapping:
  dark:
    black: "base"
    red: "red"
    green: "green"
    yellow: "yellow"
    blue: "blue"
    magenta: "mauve"
    cyan: "teal"
    white: "subtext1"
    bright_black: "surface2"
    bright_red: "maroon"
    bright_green: "green"
    bright_yellow: "peach"
    bright_blue: "sapphire"
    bright_magenta: "pink"
    bright_cyan: "sky"
    bright_white: "text"
  light:
    black: "subtext1"
    red: "red"
    green: "green"
    yellow: "yellow"
    blue: "blue"
    magenta: "mauve"
    cyan: "teal"
    white: "base"
    bright_black: "overlay2"
    bright_red: "maroon"
    bright_green: "green"
    bright_yellow: "peach"
    bright_blue: "sapphire"
    bright_magenta: "pink"
    bright_cyan: "sky"
    bright_white: "crust"

# Syntax highlighting mapping
syntax_mapping:
  keyword: "mauve"
  function: "sapphire"
  type: "teal"
  property: "peach"
  string: "green"
  number: "yellow"
  variable: "lavender"
  operator: "pink"
  decorator: "rose"
  self: "sky"
  enum_value: "gold"
  comment: "comment"
  error_type: "red"
  punctuation: "text"

# Semantic UI mapping
ui_mapping:
  error: "red"
  warning: "yellow"
  info: "sky"
  success: "green"
  diff_added: "green"
  diff_removed: "red"
  diff_modified: "maroon"
  selection: "blue"
  search_match: "yellow"
  link: "sky"
  inline_code: "peach"
