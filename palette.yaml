    accents:
      red:
        hex: "#d20f39"
        oklch: { l: 0.55, c: 0.216, h: 20 }
        role: "Errors, deletions"
      maroon:
        hex: "#e64553"
        oklch: { l: 0.63, c: 0.197, h: 20 }
        role: "Diff modified"
      peach:
        hex: "#fe640b"
        oklch: { l: 0.69, c: 0.204, h: 42 }
        role: "Properties, params (signature accent)"
        signature: true
      yellow:
        hex: "#df8e1d"
        oklch: { l: 0.71, c: 0.149, h: 68 }
        role: "Numbers, booleans, warnings"
      gold:
        hex: "#dc8a78"
        oklch: { l: 0.71, c: 0.105, h: 33 }
        role: "Enum values, special constants"
      green:
        hex: "#40a02b"
        oklch: { l: 0.63, c: 0.177, h: 140 }
        role: "Strings, success, additions"
      teal:
        hex: "#179299"
        oklch: { l: 0.60, c: 0.098, h: 201 }
        role: "Types, interfaces"
      sky:
        hex: "#04a5e5"
        oklch: { l: 0.68, c: 0.145, h: 235 }
        role: "self/this, info, links"
      sapphire:
        hex: "#209fb5"
        oklch: { l: 0.65, c: 0.107, h: 213 }
        role: "Functions, methods"
      blue:
        hex: "#1e66f5"
        oklch: { l: 0.56, c: 0.226, h: 262 }
        role: "Selection, focus, UI accent"
      lavender:
        hex: "#7287fd"
        oklch: { l: 0.66, c: 0.175, h: 273 }
        role: "Variables, local bindings"
      mauve:
        hex: "#8839ef"
        oklch: { l: 0.55, c: 0.250, h: 297 }
        role: "Keywords, control flow"
      pink:
        hex: "#ea76cb"
        oklch: { l: 0.73, c: 0.174, h: 338 }
        role: "Operators"
      rose:
        hex: "#dd7878"
        oklch: { l: 0.69, c: 0.126, h: 21 }
        role: "Decorators, annotations"

