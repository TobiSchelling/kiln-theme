# Kiln — Warm Clarity Color Theme
# Source of truth for all color definitions.
# OKLCH values are canonical; hex is derived.
#
# OKLCH: L = lightness (0-1), C = chroma (0-0.4), H = hue (0-360)
# Hue reference: 0=pink, 30=red, 60=orange, 90=yellow, 140=green,
#                180=teal, 220=blue, 270=purple, 330=magenta

