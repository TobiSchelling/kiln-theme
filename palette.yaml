# Kiln — Warm Clarity Color Theme
# Source of truth for all color definitions.
# OKLCH values are canonical; hex is derived.
#
# OKLCH: L = lightness (0-1), C = chroma (0-0.4), H = hue (0-360)
# Hue reference: 0=pink, 30=red, 60=orange, 90=yellow, 140=green,
#                180=teal, 220=blue, 270=purple, 330=magenta

name: kiln
version: "0.1.0"
author: Tobias

variants:
  dark:
    display_name: "Kiln Dark"

    base:
      crust:
        hex: "#12100C"
        oklch: { l: 0.10, c: 0.015, h: 70 }
        role: "Window frame, status bars"
      mantle:
        hex: "#191612"
        oklch: { l: 0.13, c: 0.015, h: 70 }
        role: "Sidebar, panel backgrounds"
      base:
        hex: "#211D17"
        oklch: { l: 0.16, c: 0.018, h: 70 }
        role: "Editor background"
      surface0:
        hex: "#2C2720"
        oklch: { l: 0.21, c: 0.018, h: 70 }
        role: "Current line highlight"
      surface1:
        hex: "#38322A"
        oklch: { l: 0.26, c: 0.018, h: 70 }
        role: "Hover states, active tabs"
      surface2:
        hex: "#443D33"
        oklch: { l: 0.31, c: 0.018, h: 70 }
        role: "Borders, dividers"
      overlay0:
        hex: "#56503E"
        oklch: { l: 0.38, c: 0.020, h: 70 }
        role: "Popup menus, tooltips"
      overlay1:
        hex: "#68614D"
        oklch: { l: 0.45, c: 0.020, h: 70 }
        role: "Search widgets, cmd palette"
      overlay2:
        hex: "#7A735C"
        oklch: { l: 0.52, c: 0.020, h: 70 }
        role: "Nested overlays"

    text:
      text:
        hex: "#F8F4F0"
        oklch: { l: 0.97, c: 0.008, h: 70 }
        role: "Primary text"
      subtext1:
        hex: "#D0C8BC"
        oklch: { l: 0.82, c: 0.015, h: 70 }
        role: "Labels, metadata"
      subtext0:
        hex: "#A8A094"
        oklch: { l: 0.68, c: 0.012, h: 70 }
        role: "Placeholders, disabled"
      comment:
        hex: "#7A6F5E"
        oklch: { l: 0.50, c: 0.025, h: 70 }
        role: "Code comments"

    accents:
      red:
        hex: "#E8665E"
        oklch: { l: 0.64, c: 0.17, h: 25 }
        role: "Errors, deletions"
      maroon:
        hex: "#DB7450"
        oklch: { l: 0.65, c: 0.15, h: 42 }
        role: "Diff modified"
      peach:
        hex: "#E08A50"
        oklch: { l: 0.70, c: 0.15, h: 55 }
        role: "Properties, params (signature accent)"
        signature: true
      yellow:
        hex: "#DBA840"
        oklch: { l: 0.75, c: 0.15, h: 85 }
        role: "Numbers, booleans, warnings"
      gold:
        hex: "#C9A340"
        oklch: { l: 0.72, c: 0.13, h: 90 }
        role: "Enum values, special constants"
      green:
        hex: "#86BE60"
        oklch: { l: 0.75, c: 0.14, h: 135 }
        role: "Strings, success, additions"
      teal:
        hex: "#4DBFA5"
