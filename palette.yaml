# Syntax highlighting mapping
syntax_mapping:
  keyword: "mauve"
  function: "sapphire"
  type: "teal"
  property: "peach"
  string: "green"
  number: "yellow"
  variable: "lavender"
  operator: "pink"
  decorator: "rose"
  self: "sky"
  enum_value: "gold"
  comment: "comment"
  error_type: "red"
  punctuation: "text"

# Heading color mapping (per-variant, used by obsidian and nvim markup)
heading_mapping:
  default:
    h1: "peach"
    h2: "yellow"
    h3: "gold"
    h4: "green"
    h5: "teal"
    h6: "sapphire"
  glow:
    h1: "red"
    h2: "maroon"
    h3: "gold"
    h4: "green"
    h5: "teal"
    h6: "sapphire"

# Semantic UI mapping
ui_mapping:
  error: "red"
  warning: "yellow"
  info: "sky"
  success: "green"
  diff_added: "green"
  diff_removed: "red"
  diff_modified: "maroon"
  selection: "blue"
  search_match: "yellow"
  link: "sky"
  inline_code: "peach"
